<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="96" height="96" rx="16" fill="black"></rect>
  <g transform="translate(48 48)">
    <g>
      <polygon points="0,-22 4,-4 22,0 4,4 0,22 -4,4 -22,0 -4,-4" fill="url(#glow)"></polygon>
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="4s" repeatCount="indefinite"></animateTransform>
    </g>
  </g>
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="rotate(90) scale(22)">
      <stop stop-color="#a78bfa"></stop>
      <stop offset="1" stop-color="#22d3ee" stop-opacity=".2"></stop>
    </radialGradient>
  </defs>
